<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | Online Tools</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma, sans-serif;
}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
width:420px;
max-width:90%;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
resize:none;
padding:15px;
font-size:16px;
border:none;
border-radius:12px;
background:#eef2ff;
outline:none;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.card{
background:#f1f5f9;
padding:15px;
border-radius:12px;
text-align:center;
}

.card span{
display:block;
font-size:24px;
font-weight:bold;
color:#4f46e5;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#4f46e5;
}

</style>

</head>

<body>

<div class="box">

<h2>📄 Word Counter</h2>

<textarea 
id="text"
placeholder="Type or paste your text here..."
></textarea>


<div class="stats">

<div class="card">
<span id="words">0</span>
Words
</div>


<div class="card">
<span id="chars">0</span>
Characters
</div>


<div class="card">
<span id="letters">0</span>
Letters
</div>


<div class="card">
<span id="lines">0</span>
Lines
</div>

</div>


<a href="../../index.html">
⬅ Back to Home
</a>


</div>


<script>

const text = document.getElementById("text");

text.addEventListener("input", update);


function update(){

let value = text.value;


let words = value.trim()
? value.trim().split(/\s+/).length
: 0;


let chars = value.length;


let letters = value.replace(
/[^a-zA-Z\u0600-\u06FF]/g,
""
).length;


let lines = value
? value.split("\n").length
: 0;


document.getElementById("words").innerHTML = words;

document.getElementById("chars").innerHTML = chars;

document.getElementById("letters").innerHTML = letters;

document.getElementById("lines").innerHTML = lines;

}

</script>

</body>

</html>
