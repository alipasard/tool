<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator | Online Tools</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
width:400px;
max-width:90%;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
background:#eef2ff;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:12px;
background:#4f46e5;
color:white;
font-size:17px;
cursor:pointer;
}

#qrcode{
margin:25px auto;
display:flex;
justify-content:center;
}

a{
display:block;
margin-top:20px;
text-decoration:none;
color:#4f46e5;
}

</style>

</head>


<body>


<div class="box">


<h2>📱 QR Code Generator</h2>


<input 
id="text"
placeholder="Enter text or URL"
>


<button onclick="generateQR()">
Generate QR Code
</button>


<div id="qrcode"></div>


<a href="../../index.html">
⬅ Back to Home
</a>


</div>



<script>


let qr;


function generateQR(){


let text =
document.getElementById("text").value;


let box =
document.getElementById("qrcode");


box.innerHTML="";


if(!text){

alert("Please enter text or URL");

return;

}


qr = new QRCode(box,{

text:text,

width:200,

height:200

});


}


</script>


</body>

</html>
